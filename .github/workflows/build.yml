name: Build
on:
  push:
    branches:
      - master
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v5
      - name: Setup bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
      - name: Bazel build
        run: bazel build //...
      - name: Bazel test
        run: bazel test //...
      - name: Upload anki-backup addon
        uses: actions/upload-artifact@v4
        with:
          name: anki-backup-addon
          path: bazel-bin/anki_backup_api/anki-backup.ankiaddon
          if-no-files-found: error
      - name: Upload japanese-dictionary-importer addon
        uses: actions/upload-artifact@v4
        with:
          name: japanese-dictionary-importer-addon
          path: bazel-bin/japanese_dictionary_api/japanese-dictionary-importer.ankiaddon
          if-no-files-found: error
